version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kanbanmaster-db
    environment:
      POSTGRES_DB: kanbanmaster
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: kanbanmaster-api
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@db:5432/kanbanmaster?sslmode=disable
      JWT_SECRET: change-this-in-production
      ENVIRONMENT: development
    ports:
      - "8080:8080"
    depends_on:
      - db

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: kanbanmaster-app
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
